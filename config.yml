backend:
  name: github
  repo: YOUR_GITHUB_USERNAME/YOUR_REPO_NAME
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

site_url: https://YOUR_USERNAME.github.io/YOUR_REPO_NAME
display_url: https://YOUR_USERNAME.github.io/YOUR_REPO_NAME

collections:
  - name: "projects"
    label: "Projects"
    files:
      - name: "projects"
        label: "Project List"
        file: "content/projects.json"
        format: "json"
        fields:
          - name: projects
            label: Projects
            widget: list
            fields:
              - { name: title, label: Title, widget: string }
              - { name: description, label: Description, widget: text }
              - { name: link, label: GitHub / Live Link, widget: string }
              - { name: image, label: Image, widget: image }
              - { name: category, label: Category, widget: select, options: ["Web", "App", "Game", "Other"] }